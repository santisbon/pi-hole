apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pihole.fullname" . }}
  labels:
    {{- include "pihole.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  # Recreate avoids two pods competing for the same ReadWriteOnce PVC and DNS port.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "pihole.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "pihole.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      containers:
        - name: pihole
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: TZ
              value: {{ .Values.timezone | quote }}
            - name: FTLCONF_dns_listeningMode
              value: {{ .Values.dnsListeningMode | quote }}
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: {{ include "pihole.secretName" . }}
                  key: web-password
            {{- if .Values.persistence.dnsmasq.enabled }}
            - name: FTLCONF_misc_etc_dnsmasq_d
              value: "true"
            {{- end }}
            {{- range $key, $val := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
          {{- $caps := list }}
          {{- if .Values.capabilities.netAdmin }}
          {{- $caps = append $caps "NET_ADMIN" }}
          {{- end }}
          {{- if .Values.capabilities.sysTime }}
          {{- $caps = append $caps "SYS_TIME" }}
          {{- end }}
          {{- if .Values.capabilities.sysNice }}
          {{- $caps = append $caps "SYS_NICE" }}
          {{- end }}
          {{- if $caps }}
          securityContext:
            capabilities:
              add:
                {{- range $caps }}
                - {{ . }}
                {{- end }}
          {{- end }}
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: pihole-data
              mountPath: /etc/pihole
            {{- if .Values.persistence.dnsmasq.enabled }}
            - name: dnsmasq-data
              mountPath: /etc/dnsmasq.d
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: pihole-data
          persistentVolumeClaim:
            claimName: {{ include "pihole.pvcPihole" . }}
        {{- if .Values.persistence.dnsmasq.enabled }}
        - name: dnsmasq-data
          persistentVolumeClaim:
            claimName: {{ include "pihole.pvcDnsmasq" . }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
